backend:
  name: github
  repo: asym-intel/asym-intel-main
  branch: main
  base_url: https://asym-intel-oauth.peterhowitt.workers.dev

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

collections:

  # ── Monitor briefings ──────────────────────────────────────────────────────

  - name: "european-strategic-autonomy"
    label: "European Strategic Autonomy"
    folder: "content/monitors/european-strategic-autonomy"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "One-line Summary", name: "summary", widget: "text",
         hint: "One sentence — appears on homepage feed card and in email subject"}
      - {label: "Featured Image (OG)", name: "image", widget: "image", required: false,
         hint: "Optional. Shows when shared on social media. Leave blank to use the site default."}
      - {label: "Draft", name: "draft", widget: "boolean", default: false}
      - {label: "Monitor", name: "monitor", widget: "hidden", default: "european-strategic-autonomy"}
      - {label: "Full Briefing", name: "body", widget: "markdown"}

  - name: "democratic-integrity"
    label: "Democratic Integrity"
    folder: "content/monitors/democratic-integrity"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "One-line Summary", name: "summary", widget: "text",
         hint: "One sentence — appears on homepage feed card"}
      - {label: "Featured Image (OG)", name: "image", widget: "image", required: false,
         hint: "Optional. Shows when shared on social media."}
      - {label: "Draft", name: "draft", widget: "boolean", default: false}
      - {label: "Monitor", name: "monitor", widget: "hidden", default: "democratic-integrity"}
      - {label: "Full Briefing", name: "body", widget: "markdown"}

  - name: "macro-monitor"
    label: "Global Macro"
    folder: "content/monitors/macro-monitor"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "One-line Summary", name: "summary", widget: "text",
         hint: "One sentence — appears on homepage feed card"}
      - {label: "Featured Image (OG)", name: "image", widget: "image", required: false,
         hint: "Optional. Shows when shared on social media."}
      - {label: "Draft", name: "draft", widget: "boolean", default: false}
      - {label: "Monitor", name: "monitor", widget: "hidden", default: "macro-monitor"}
      - {label: "Full Briefing", name: "body", widget: "markdown"}

  - name: "ai-governance"
    label: "AI Governance"
    folder: "content/monitors/ai-governance"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string",
         hint: "e.g. AI Governance — Week of 29 March 2026"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "One-line Summary", name: "summary", widget: "text",
         hint: "One sentence — appears on homepage feed card"}
      - {label: "Featured Image (OG)", name: "image", widget: "image", required: false,
         hint: "Optional. Shows when shared on social media."}
      - {label: "Draft", name: "draft", widget: "boolean", default: false}
      - {label: "Monitor", name: "monitor", widget: "hidden", default: "ai-governance"}
      - {label: "Full Briefing", name: "body", widget: "markdown"}

  - name: "fimi-cognitive-warfare"
    label: "FIMI & Cognitive Warfare"
    folder: "content/monitors/fimi-cognitive-warfare"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "One-line Summary", name: "summary", widget: "text",
         hint: "One sentence — appears on homepage feed card"}
      - {label: "Featured Image (OG)", name: "image", widget: "image", required: false,
         hint: "Optional. Shows when shared on social media."}
      - {label: "Draft", name: "draft", widget: "boolean", default: false}
      - {label: "Monitor", name: "monitor", widget: "hidden", default: "fimi-cognitive-warfare"}
      - {label: "Full Briefing", name: "body", widget: "markdown"}

  - name: "environmental-risks"
    label: "Environmental Risks & Planetary Boundaries"
    folder: "content/monitors/environmental-risks"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "One-line Summary", name: "summary", widget: "text",
         hint: "One sentence — appears on homepage feed card"}
      - {label: "Featured Image (OG)", name: "image", widget: "image", required: false,
         hint: "Optional. Shows when shared on social media."}
      - {label: "Draft", name: "draft", widget: "boolean", default: false}
      - {label: "Monitor", name: "monitor", widget: "hidden", default: "environmental-risks"}
      - {label: "Full Briefing", name: "body", widget: "markdown"}

  - name: "conflict-escalation"
    label: "Strategic Conflict & Escalation"
    folder: "content/monitors/conflict-escalation"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "One-line Summary", name: "summary", widget: "text",
         hint: "One sentence — appears on homepage feed card"}
      - {label: "Featured Image (OG)", name: "image", widget: "image", required: false,
         hint: "Optional. Shows when shared on social media."}
      - {label: "Draft", name: "draft", widget: "boolean", default: false}
      - {label: "Monitor", name: "monitor", widget: "hidden", default: "conflict-escalation"}
      - {label: "Full Briefing", name: "body", widget: "markdown"}

  # ── Topic pages ────────────────────────────────────────────────────────────
  - name: "topics"
    label: "Topic Pages"
    folder: "content/topics"
    create: false
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Last Updated", name: "date", widget: "datetime"}
      - {label: "Connected Monitor", name: "relatedMonitor", widget: "string",
         hint: "Slug of the related monitor, e.g. ai-governance"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Featured Image (OG)", name: "image", widget: "image", required: false,
         hint: "Optional. Shows when this topic page is shared on social."}
      - {label: "Content", name: "body", widget: "markdown"}

  # ── Site pages ─────────────────────────────────────────────────────────────
  - name: "pages"
    label: "Site Pages"
    files:
      - label: "About"
        name: "about"
        file: "content/about.md"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Description", name: "description", widget: "text"}
          - {label: "Content", name: "body", widget: "markdown"}
