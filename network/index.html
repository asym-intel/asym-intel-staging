<html lang="en" data-theme="dark">
<head>

  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

  <style>
    /* ── Reset & Tokens ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }

    :root {
      --nb-bg:      #1a1918;
      --nb-border:  #2d2c2a;
      --nb-text:    #a8a7a4;
      --nb-hover:   #e0dfdc;
      --nb-teal:    #4f98a3;
      --nb-height:  40px;
      --font-body:  'Satoshi', 'Inter', sans-serif;
      --font-serif: 'Instrument Serif', Georgia, serif;

      /* Graph canvas bg */
      --canvas-bg:  #0d0d0b;

      /* Monitor colours (match graph.json) */
      --c-ai:       #4f98a3;
      --c-conflict: #c0392b;
      --c-demo:     #8e44ad;
      --c-env:      #27ae60;
      --c-esa:      #2980b9;
      --c-fimi:     #e67e22;
      --c-macro:    #f39c12;

      /* UI */
      --panel-bg:   #141412;
      --panel-border: #2a2926;
      --text-primary: #e0dfdc;
      --text-muted:   #b0afac;
      --text-faint:   #7a7874;
      --radius: 6px;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    body {
      font-family: var(--font-body);
      background: var(--canvas-bg);
      color: var(--text-primary);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Network bar injected by nav.js — no inline styles needed */

    /* ── Controls Bar ────────────────────────────────────────────── */
    .controls {
      position: relative;
      z-index: 50;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: var(--space, 8px);
      padding: 8px 20px;
      background: rgba(20, 19, 18, 0.95);
      border-bottom: 1px solid #1e1d1b;
      flex-wrap: wrap;
    }

    .controls__label {
      font-size: 12.5px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-faint);
      flex-shrink: 0;
      margin-right: 4px;
    }

    .filter-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid transparent;
      background: #1e1d1b;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: all 150ms var(--ease);
      flex-shrink: 0;
    }
    .filter-btn:hover { color: var(--text-primary); background: #2a2926; }
    .filter-btn.active {
      color: var(--text-primary);
      border-color: var(--btn-color, #4f98a3);
      background: color-mix(in oklab, var(--btn-color, #4f98a3) 12%, transparent);
    }
    .filter-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--btn-color, #4f98a3);
      flex-shrink: 0;
    }

    .controls__divider {
      width: 1px; height: 18px;
      background: #2a2926;
      flex-shrink: 0;
      margin: 0 4px;
    }

    .search-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .search-wrap svg {
      position: absolute; left: 8px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-faint);
      pointer-events: none;
    }
    .search-input {
      padding: 4px 10px 4px 28px;
      border-radius: 999px;
      border: 1px solid #2a2926;
      background: #1a1918;
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 14px;
      width: 180px;
      outline: none;
      transition: border-color 150ms ease, width 200ms var(--ease);
    }
    .search-input:focus { border-color: #4f98a3; width: 220px; }
    .search-input::placeholder { color: var(--text-faint); }

    .controls__right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

    .reset-btn {
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid #2a2926;
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 14px;
      cursor: pointer;
      transition: all 150ms ease;
    }
    .reset-btn:hover { color: var(--text-primary); border-color: #3a3936; }

    /* ── Graph Canvas ────────────────────────────────────────────── */
    #graph-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* ForceGraph injects its own wrapper inside #graph-container */
    #graph-container,
    #graph-container > div.force-graph-container {
      width: 100% !important;
      height: 100% !important;
      position: absolute !important;
      inset: 0 !important;
    }

    /* ── Side Panel ──────────────────────────────────────────────── */
    .panel {
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 340px;
      background: var(--panel-bg);
      border-left: 1px solid var(--panel-border);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 320ms var(--ease);
      z-index: 40;
      overflow: hidden;
    }
    .panel.open { transform: translateX(0); }

    .panel__header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--panel-border);
      gap: 12px;
      flex-shrink: 0;
    }

    .panel__type-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
      border: 1px solid transparent;
    }

    .panel__title {
      font-family: var(--font-serif);
      font-size: 20.5px;
      line-height: 1.3;
      color: var(--text-primary);
      flex: 1;
    }

    .panel__close {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1px solid #2a2926;
      background: transparent;
      color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 150ms ease;

    .panel__close:hover { color: var(--text-primary); border-color: #3a3936; }

    .panel__body { overflow-y: auto; flex: 1; padding: 16px 20px; }

    .panel__meta {
      font-size: 12.5px;
      color: var(--text-faint);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .panel__description {
      font-size: 16px;
      line-height: 1.6;
      color: #a8a7a4;
      margin-bottom: 20px;
    }

    .panel__section-label {
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 8px;

    .panel__connections { margin-bottom: 20px; }

    .connection-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: var(--radius);
      background: #1a1918;
      border: 1px solid #222120;
      margin-bottom: 6px;
      cursor: pointer;
      transition: all 150ms ease;
    }
    .connection-item:hover { background: #222120; border-color: #2e2d2b; }
    .connection-dot {
      width: 8px; height: 8px;

      flex-shrink: 0;

      padding: 10px 16px;

    /* ── Loading State ───────────────────────────────────────────── */
    #loading {
      position: absolute;

      display: flex;
      flex-direction: column;
      align-items: center;

      letter-spacing: 0.04em;

    .loading-dots {
      display: flex; gap: 6px;
    }
    .loading-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #4f98a3;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50%       { opacity: 1;   transform: scale(1); }
    }

    /* ── Legend ──────────────────────────────────────────────────── */
    .legend {

      left: 20px;
      background: rgba(20, 19, 18, 0.9);

      border-radius: var(--radius);
      padding: 12px 14px;

    ::-webkit-scrollbar { width: 4px; }

<script>
(async function () {
  // ── Load graph data ─────────────────────────────────────────────
  let graphData;
  try {
    const res = await fetch('data/graph.json');
    graphData = await res.json();
  } catch(e) {
    document.getElementById('loading').innerHTML =
      '<span style="color:#c0392b">Failed to load graph data.</span>';
    return;
  }

  const { nodes, edges } = graphData;

  // Monitor slug → color map
  const MONITOR_COLORS = {
    'ai-governance': '#4f98a3',
    'conflict-escalation': '#c0392b',
    'democratic-integrity': '#8e44ad',
    'environmental-risks': '#27ae60',
    'european-strategic-autonomy': '#2980b9',
    'fimi-cognitive-warfare': '#e67e22',
    'macro-monitor': '#f39c12',

  };

  // ── State ────────────────────────────────────────────────────────
  let activeFilter = 'all';
  let searchQuery = '';
  let selectedNode = null;

  // ── Build edge map for panel connections ────────────────────────
  const edgeMap = {}; // nodeId → [{otherId, relation, title, report_url, first_flagged}]
  edges.forEach(e => {
    if (!edgeMap[e.source]) edgeMap[e.source] = [];
    if (!edgeMap[e.target]) edgeMap[e.target] = [];
    const entry = {
      otherId:       e.target,
      relation:      e.relation,
      title:         e.title,
      report_url:    e.report_url    || null,
      first_flagged: e.first_flagged || null,
    };
    edgeMap[e.source].push(entry);
    edgeMap[e.target].push({ ...entry, otherId: e.source });
  });

  const nodeMap = {};
  nodes.forEach(n => { nodeMap[n.id] = n; });

  // ── Prepare force-graph data ────────────────────────────────────
  function buildGraphData(filter, search) {
    let visibleIds = new Set();

    if (filter === 'all') {
      nodes.forEach(n => visibleIds.add(n.id));
    } else {
      // Show the selected monitor + directly connected nodes
      nodes.forEach(n => {
        if (n.monitor === filter || n.id === filter) visibleIds.add(n.id);
      });
      // Add neighbours
      edges.forEach(e => {
        if (visibleIds.has(e.source)) visibleIds.add(e.target);
        if (visibleIds.has(e.target)) visibleIds.add(e.source);
      });
    }

    // Apply search
    if (search.trim()) {
      const q = search.toLowerCase();
      visibleIds = new Set([...visibleIds].filter(id => {
        const n = nodeMap[id];
        return n && (
          n.label.toLowerCase().includes(q) ||
          (n.description || '').toLowerCase().includes(q)
        );
      }));
      // Keep monitors connected to matches
      [...visibleIds].forEach(id => {
        (edgeMap[id] || []).forEach(({ otherId }) => {
          if (nodeMap[otherId]?.type === 'monitor') visibleIds.add(otherId);
        });
      });
    }

    const candidateNodes = nodes.filter(n => visibleIds.has(n.id));
    const candidateIds = new Set(candidateNodes.map(n => n.id));
    const candidateEdges = edges.filter(e =>
      candidateIds.has(e.source) && candidateIds.has(e.target)
    );

    // Exclude orphan nodes (no edges in current view) unless they are monitors or reports
    const connectedIds = new Set();
    candidateEdges.forEach(e => { connectedIds.add(e.source); connectedIds.add(e.target); });
    const filteredNodes = candidateNodes
      .filter(n => n.type === 'monitor' || n.type === 'report' || connectedIds.has(n.id))
      .map(n => ({ ...n, dimmed: false }));

    const filteredNodeIds = new Set(filteredNodes.map(n => n.id));
    const filteredEdges = candidateEdges.filter(e =>
      filteredNodeIds.has(e.source) && filteredNodeIds.has(e.target)
    );

    return {
      nodes: filteredNodes,
      links: filteredEdges.map(e => ({
        source: e.source,
        target: e.target,
        relation: e.relation,
        title: e.title,
        curvature: 0.1,
      }))
    };
  }

  // ── Init graph ──────────────────────────────────────────────────
  const container = document.getElementById('graph-container');
  const wrap = document.getElementById('graph-wrap');

  // Pre-spread nodes to avoid cold-start collapse
  const initData = buildGraphData(activeFilter, searchQuery);
  const W = wrap.clientWidth, H = wrap.clientHeight;
  // First pass: position monitors in a circle
  const monitors = initData.nodes.filter(n => n.type === 'monitor');
  const monitorPositions = {};
  monitors.forEach((n, i) => {
    const angle = (2 * Math.PI * i) / monitors.length;
    const r = Math.min(W, H) * 0.25;
    n.x = Math.cos(angle) * r;
    n.y = Math.sin(angle) * r;
    monitorPositions[n.id] = { x: n.x, y: n.y };
  });
  // Second pass: cluster reports near their parent monitor
  const reportsByMonitor = {};
  initData.nodes.filter(n => n.type === 'report').forEach(n => {
    if (!reportsByMonitor[n.monitor]) reportsByMonitor[n.monitor] = [];
    reportsByMonitor[n.monitor].push(n);
  });
  Object.entries(reportsByMonitor).forEach(([slug, reports]) => {
    const parent = monitorPositions[slug] || { x: 0, y: 0 };
    reports.forEach((n, i) => {
      const angle = (2 * Math.PI * i) / reports.length + Math.random() * 0.3;
      const r = 40 + Math.random() * 20;
      n.x = parent.x + Math.cos(angle) * r;
      n.y = parent.y + Math.sin(angle) * r;
    });
  });
  // Remaining non-monitor, non-report nodes
  initData.nodes.filter(n => n.type !== 'monitor' && n.type !== 'report').forEach((n, i) => {
    const angle = (2 * Math.PI * i) / initData.nodes.length;
    n.x = Math.cos(angle) * Math.min(W, H) * 0.38;
    n.y = Math.sin(angle) * Math.min(W, H) * 0.38;
  });

  const Graph = ForceGraph()(container)
    .graphData(initData)
    .backgroundColor('#0d0d0b')
    .width(wrap.clientWidth)
    .height(wrap.clientHeight)
    .nodeId('id')
    .nodeLabel('')  // we use custom tooltip
    .nodeVal(n => n.type === 'monitor' ? 18 : n.type === 'report' ? 5 : 6)
    .nodeColor(n => {
      const base = MONITOR_COLORS[n.monitor] || '#4f98a3';
      if (selectedNode && selectedNode.id !== n.id) return dimColor(base, 0.25);
      return n.type === 'report' ? dimColor(base, 0.65) : base;
    })
    .nodeCanvasObjectMode(() => 'replace')
    .nodeCanvasObject((node, ctx, globalScale) => {
      const color = MONITOR_COLORS[node.monitor] || '#4f98a3';
      const isDimmed = selectedNode && selectedNode.id !== node.id;
      const isMonitor = node.type === 'monitor';
      const isReport  = node.type === 'report';
      const isSelected = selectedNode && selectedNode.id === node.id;

      // Draw node shape
      if (isReport) {
        // Diamond shape for reports
        const size = 5;
        ctx.save();
        ctx.translate(node.x, node.y);
        ctx.rotate(Math.PI / 4);
        ctx.fillStyle = isDimmed ? dimColor(color, 0.15) : dimColor(color, 0.65);
        ctx.fillRect(-size / 2, -size / 2, size, size);
        ctx.strokeStyle = isDimmed ? dimColor(color, 0.2) : dimColor(color, 0.9);
        ctx.lineWidth = 0.8;
        ctx.strokeRect(-size / 2, -size / 2, size, size);
        ctx.restore();
      } else {
        // Circle for monitors
        const r = isMonitor ? 12 : 5;
        ctx.beginPath();
        ctx.arc(node.x, node.y, r, 0, 2 * Math.PI);
        ctx.fillStyle = isDimmed ? dimColor(color, 0.25) : color;
        ctx.fill();
      }

      // Draw label
      const showLabel = isMonitor || isSelected || (isReport && globalScale > 1.5);
      if (!showLabel) return;

      let label, fontSize;
      if (isMonitor) {
        label = node.label;
        fontSize = Math.max(11.5, 14.95 / globalScale);
      } else if (isReport) {
        label = node.date || '';
        fontSize = Math.max(8, 10 / globalScale);
      } else {
        label = truncate(node.label, 28);
        fontSize = Math.max(10.4, 12.65 / globalScale);
      }

      ctx.font = `${isMonitor ? '600' : '400'} ${fontSize}px Satoshi, Inter, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.shadowColor = 'rgba(0,0,0,0.85)';
      ctx.shadowBlur = 6;
      ctx.fillStyle = isDimmed ? dimColor(color, 0.35) : color;

      const nodeR = isMonitor ? 14 : 6;
      ctx.fillText(label, node.x, node.y + nodeR + 4 / globalScale);
      ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
    })
    .linkColor(link => {
      const relColors = {
        extends: '#4f98a3',
        contextualises: '#3a3936',
        correlates: '#5a5754',
        cites: '#2d6b71',
        contradicts: '#8e4444',
        analyses: '#3d5a6e',
        published_by: '#2a2926',
      };
      return relColors[link.relation] || '#3a3936';
    })
    .linkWidth(link => link.relation === 'published_by' ? 0.4 : link.relation === 'extends' ? 1.5 : 0.8)
    .linkDirectionalParticles(link => link.relation === 'extends' ? 2 : 0)
    .linkDirectionalParticleWidth(1.5)
    .linkDirectionalParticleColor(link => '#4f98a3')
    .linkDirectionalParticleSpeed(0.004)
    .linkCurvature('curvature')
    .onNodeClick((node) => {
      const now = Date.now();
      if (selectedNode && selectedNode.id === node.id && (now - (window._lastNodeClick || 0)) < 350) {
        // Double-click on same node — close panel
        closePanel();
      } else {
        selectNode(node);
      }
      window._lastNodeClick = now;
    })
    .onNodeHover((node) => {
      const tooltip = document.getElementById('tooltip');
      if (node) {
        if (node.type === 'monitor') {
          tooltip.textContent = `${node.label} — ${node.week_label || ''}`;
        } else if (node.type === 'report') {
          tooltip.textContent = `${node.label}`;
        } else {
          tooltip.textContent = node.label;
        }
        tooltip.classList.add('visible');
        container.style.cursor = 'pointer';
      } else {
        tooltip.classList.remove('visible');
        container.style.cursor = 'default';
      }
    })
    .onBackgroundClick(() => {
      closePanel();
    })
    .cooldownTicks(200)
    .d3AlphaDecay(0.015)
    .d3VelocityDecay(0.25)
    .onEngineStop(() => {
      if (!window._Graph) return;
      // Fit graph to viewport with smooth animation
      window._Graph.zoomToFit(1000, 80);
    });

  window._Graph = Graph;

  // Force tuning: keep the graph contained and readable
  Graph.d3Force('charge').strength(n => {
    if (n.type === 'monitor') return -600;
    if (n.type === 'report')  return -15;  // cluster tight near parent
    return -120;
  });
  // Link distances: reports tight to parent, monitors spread apart
  Graph.d3Force('link')
    .distance(link => {
      const src = typeof link.source === 'object' ? link.source : null;
      const tgt = typeof link.target === 'object' ? link.target : null;
      const bothMonitor = src?.type === 'monitor' && tgt?.type === 'monitor';
      const isReportLink = src?.type === 'report' || tgt?.type === 'report';
      if (isReportLink) return 35;
      return bothMonitor ? 200 : 120;
    })
    .strength(link => {
      const src = typeof link.source === 'object' ? link.source : null;
      const tgt = typeof link.target === 'object' ? link.target : null;
      const isReportLink = src?.type === 'report' || tgt?.type === 'report';
      return isReportLink ? 1.2 : 0.5;
    })
    .iterations(2);

  // Move tooltip with mouse
  wrap.addEventListener('mousemove', (e) => {
    const tooltip = document.getElementById('tooltip');
    if (tooltip.classList.contains('visible')) {
      const rect = wrap.getBoundingClientRect();
      tooltip.style.left = (e.clientX - rect.left + 14) + 'px';
      tooltip.style.top = (e.clientY - rect.top - 10) + 'px';
    }
  });

  // Hide loading
  document.getElementById('loading').style.display = 'none';

  // ── Resize ──────────────────────────────────────────────────────
  const ro = new ResizeObserver(() => {
    Graph.width(wrap.clientWidth).height(wrap.clientHeight);
  });
  ro.observe(wrap);

  // ── Helpers ─────────────────────────────────────────────────────
  function dimColor(hex, alpha) {
    // Convert hex to rgba with alpha
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  function truncate(str, n) {
    return str.length > n ? str.slice(0, n) + '…' : str;
  }

  function refreshColors() {
    Graph.nodeColor(n => {
      const base = MONITOR_COLORS[n.monitor] || '#4f98a3';
      if (selectedNode && selectedNode.id !== n.id) return dimColor(base, 0.15);
      return n.type === 'report' ? dimColor(base, 0.65) : base;
    });
  }

  // ── Panel ────────────────────────────────────────────────────────
  function selectNode(node) {
    selectedNode = node;
    refreshColors();

    const panel = document.getElementById('panel');
    const badge = document.getElementById('panel-badge');
    const title = document.getElementById('panel-title');
    const meta  = document.getElementById('panel-meta');
    const desc  = document.getElementById('panel-desc');
    const conns = document.getElementById('panel-connections');
    const link  = document.getElementById('panel-link');

    const color = MONITOR_COLORS[node.monitor] || '#c8c4bc';

    // Badge
    const badgeLabel = node.type === 'monitor' ? 'Monitor' : node.type === 'report' ? 'Report' : (node.post_type || 'Post');
    badge.textContent = badgeLabel;
    badge.style.background = dimColor(color, 0.15);
    badge.style.borderColor = dimColor(color, 0.4);
    badge.style.color = color;

    title.textContent = node.label;

    // Meta
    const parts = [];
    if (node.date) parts.push(node.date);
    if (node.week_label) parts.push(node.week_label);
    if (node.series) parts.push(`Series: ${node.series.replace(/-/g,' ')}`);
    meta.textContent = parts.join(' · ');

    // Description
    desc.textContent = node.description || '';

    // Connections
    const nodeEdges = edgeMap[node.id] || [];
    if (nodeEdges.length > 0) {
      let html = `<div class="panel__section-label">Connections (${nodeEdges.length})</div>`;
      html += '<div class="panel__connections">';
      nodeEdges.slice(0, 12).forEach(({ otherId, relation, title: edgeTitle, report_url, first_flagged }) => {
        const other = nodeMap[otherId];
        if (!other) return;
        const otherColor = MONITOR_COLORS[other.monitor] || '#c8c4bc';
        const dateStr = first_flagged
          ? `<span class="connection-date">${first_flagged}</span>` : '';
        const srcLink = report_url
          ? `<a class="connection-src" href="${report_url}" target="_blank" rel="noopener" title="Open source report" onclick="event.stopPropagation()">↗</a>` : '';
        html += `<div class="connection-item" data-node-id="${otherId}">
          <div class="connection-dot" style="background:${otherColor}"></div>
          <div class="connection-label">${truncate(other.label, 36)}${dateStr}</div>
          <div class="connection-rel-wrap">${srcLink}<span class="connection-rel">${relation}</span></div>
        </div>`;
      });
      if (nodeEdges.length > 12) {
        html += `<div style="font-size: 12.5px;color:var(--text-faint);padding:4px 10px">+${nodeEdges.length - 12} more connections</div>`;
      }
      html += '</div>';
      conns.innerHTML = html;

      // Click connection items to navigate
      conns.querySelectorAll('.connection-item').forEach(el => {
        el.addEventListener('click', () => {
          const nid = el.dataset.nodeId;
          const n = nodeMap[nid];
          if (n) {
            selectNode(n);
            Graph.centerAt(n.x, n.y, 600);
            Graph.zoom(2, 600);
          }
        });
      });
    } else {
      conns.innerHTML = '';
    }

    // Link
    link.href = node.url || '#';
    link.style.setProperty('--node-color', color);
    const openLabel = node.type === 'monitor' ? 'Open monitor dashboard' : node.type === 'report' ? 'Read full report' : 'View source';
    link.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
      <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
    </svg> ${openLabel}`;

    panel.classList.add('open');

    // Zoom to node
    Graph.centerAt(node.x, node.y, 500);
    Graph.zoom(2.5, 500);
  }

  function closePanel() {
    document.getElementById('panel').classList.remove('open');
    selectedNode = null;
    refreshColors();
  }

  document.getElementById('panel-close').addEventListener('click', () => {
    closePanel();
  });

  // ── Filters ──────────────────────────────────────────────────────
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      selectedNode = null;
      closePanel();
      Graph.graphData(buildGraphData(activeFilter, searchQuery));
      setTimeout(() => Graph.zoomToFit(400, 60), 600);
    });
  });

  // ── Search ───────────────────────────────────────────────────────
  let searchTimer;
  document.getElementById('search').addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      searchQuery = e.target.value;
      Graph.graphData(buildGraphData(activeFilter, searchQuery));
      setTimeout(() => Graph.zoomToFit(400, 60), 600);
    }, 250);
  });

  // ── Reset ────────────────────────────────────────────────────────
  document.getElementById('reset-btn').addEventListener('click', () => {
    activeFilter = 'all';
    searchQuery = '';
    selectedNode = null;
    document.getElementById('search').value = '';
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-filter="all"]').classList.add('active');
    closePanel();
    Graph.graphData(buildGraphData('all', ''));
    setTimeout(() => Graph.zoomToFit(400, 60), 800);
    refreshColors();
  });

  // onEngineStop handles initial zoom fit

})();
</script>

</body>
</html>
