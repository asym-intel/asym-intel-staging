<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive — Environmental Risks Monitor · Asymmetric Intelligence</title>
  <meta name="description" content="Full issue archive of the Environmental Risks Monitor — all weekly briefs since volume 1.">
  <link rel="stylesheet" href="../shared/css/base.css">
  <link rel="stylesheet" href="assets/monitor.css">
  <script src="../shared/js/theme.js"></script>
  <script src="../shared/js/nav.js"></script>
</head>

<body>
<nav class="monitor-nav" aria-label="Monitor navigation">
  <a class="monitor-nav__brand" href="dashboard.html"></a>
  <button class="monitor-nav__hamburger" aria-label="Toggle menu" aria-expanded="false">
    <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
      <line x1="2" y1="4.5" x2="16" y2="4.5"/><line x1="2" y1="9" x2="16" y2="9"/><line x1="2" y1="13.5" x2="16" y2="13.5"/>
    </svg>
  </button>
  <ul class="monitor-nav__links" role="list"></ul>
  <div class="monitor-nav__actions"></div>
</nav>

<div class="monitor-layout">
  <main class="monitor-main" id="main-content">

    <section class="module-section" id="section-archive">
      <div class="page-header">
        <div class="page-header__eyebrow">ERM · Asymmetric Intelligence</div>
        <h1 class="page-header__title">Archive</h1>
        <p class="page-header__sub">All weekly issues of the Environmental Risks Monitor, most recent first.</p>
      </div>

      <div id="archive-list">
        <div class="loading-state">Loading archive…</div>
      </div>
    </section>

  </main>

  <nav class="monitor-sidebar" aria-label="Page sections">
    <div class="sidebar-nav__title">Issues</div>
    <ul id="sidebar-issue-links">
      <li><a href="#section-archive">All Issues</a></li>
    </ul>
  </nav>
</div>

<footer class="monitor-footer"></footer>
<script src="../shared/js/renderer.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  fetch('data/archive.json')
    .then(function (r) { return r.json(); })
    .then(function (issues) {
      var list = document.getElementById('archive-list');
      var sidebar = document.getElementById('sidebar-issue-links');

      if (!issues || !issues.length) {
        list.innerHTML = '<p class="text-muted">No archived issues yet.</p>';
        return;
      }

      var html = '';
      var sidebarHtml = '';
      var sorted = issues.slice().reverse();

      sorted.forEach(function (issue) {
        var pub = issue.published
          ? new Date(issue.published).toLocaleDateString('en-GB', {day:'numeric', month:'long', year:'numeric'})
          : '';
        var anchor = 'issue-' + (issue.issue || issue.slug || '');
        var deltas = (issue.delta_strip || []).slice(0, 5);

        var deltaHtml = deltas.map(function (d) {
          return '<div class="delta-item" style="margin-bottom:var(--space-2)">' +
            '<div class="delta-item__rank">' + (d.rank || '') + '</div>' +
            '<div class="delta-item__body">' +
              '<div class="delta-item__module">' + escHtml(d.module_tag || '') + ' · ' + escHtml(d.delta_type || '') + '</div>' +
              '<div class="delta-item__title">' + escHtml(d.title || '') + '</div>' +
              (d.one_line ? '<div class="delta-item__one-line">' + escHtml(d.one_line) + '</div>' : '') +
            '</div>' +
          '</div>';
        }).join('');

        html +=
          '<div class="archive-entry" id="' + escHtml(anchor) + '" style="scroll-margin-top:calc(var(--network-bar-height,40px) + var(--nav-height,52px) + var(--space-4,16px))">' +
            '<div class="archive-entry__date">' + pub + '</div>' +
            '<div>' +
              '<div class="archive-entry__issue">Issue ' + (issue.issue || '—') + ' · ' + escHtml(issue.week_label || '') + '</div>' +
              '<div class="archive-entry__signal">' + escHtml(issue.signal || '') + '</div>' +
              (deltaHtml ? '<div style="margin-top:var(--space-3)">' + deltaHtml + '</div>' : '') +
              (issue.source_url ? '<div style="margin-top:var(--space-3)"><a class="archive-entry__link source-link" href="' + escHtml(issue.source_url) + '" target="_blank" rel="noopener">Full brief →</a></div>' : '') +
            '</div>' +
          '</div>';

        sidebarHtml += '<li><a href="#' + escHtml(anchor) + '">Issue ' + (issue.issue || '—') + ' · ' + escHtml(issue.week_label || '') + '</a></li>';
      });

      list.innerHTML = html;
      sidebar.innerHTML = sidebarHtml;
    })
    .catch(function () {
      document.getElementById('archive-list').innerHTML = '<div class="error-state">Failed to load archive data.</div>';
    });
});
</script>
</body>
</html>
