<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search — Global Macro Monitor · Asymmetric Intelligence</title>
  <meta name="description" content="Search all published issues of the Global Macro Monitor.">
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/css/base.css">
  <link rel="stylesheet" href="assets/monitor.css">
  <script src="../shared/js/theme.js"></script>
  <style>
    .search-wrap { max-width: 720px; padding: var(--space-10) 0; }
    .search-input-el {
      width: 100%;
      padding: var(--space-4) var(--space-5);
      font-family: var(--font-sans);
      font-size: var(--text-base);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      color: var(--color-text);
      outline: none;
      transition: border-color 0.15s;
      box-shadow: var(--shadow-sm);
    }
    .search-input-el:focus { border-color: var(--monitor-accent); }
    .search-input-el::placeholder { color: var(--color-text-faint); }
    .search-status {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      margin: var(--space-4) 0;
      min-height: 1.5em;
    }
    .search-result {
      padding: var(--space-4) 0;
      border-bottom: 1px solid var(--color-border-subtle);
    }
    .search-result:last-child { border-bottom: none; }
    .search-result__meta {
      font-size: var(--text-xs);
      color: var(--monitor-accent);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
      margin-bottom: var(--space-1);
    }
    .search-result__body {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      line-height: 1.65;
    }
    .search-result__body mark {
      background: var(--monitor-accent-bg);
      color: var(--monitor-accent);
      border-radius: 2px;
      padding: 0 2px;
    }
    .search-result__link {
      display: inline-block;
      margin-top: var(--space-2);
      font-size: var(--text-xs);
      color: var(--monitor-accent);
      text-decoration: none;
      font-weight: 600;
    }
    .search-result__link:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <nav class="monitor-nav" aria-label="Monitor navigation">
    <a class="monitor-nav__brand" href="dashboard.html">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 38 38" fill="none" aria-hidden="true" style="flex-shrink:0"><rect x="2" y="2" width="34" height="34" rx="6" stroke="var(--monitor-accent)" stroke-width="2" fill="none"/><circle cx="12" cy="10" r="2.5" fill="#e87040"/><line x1="12" y1="12.5" x2="12" y2="18" stroke="#e87040" stroke-width="1.5"/><line x1="8" y1="15" x2="16" y2="15" stroke="#e87040" stroke-width="1.5"/><line x1="12" y1="18" x2="9" y2="22" stroke="#e87040" stroke-width="1.5"/><line x1="12" y1="18" x2="15" y2="22" stroke="#e87040" stroke-width="1.5"/><polyline points="5,30 10,30 13,24 17,33 21,26 25,33 29,22 33,30" stroke="#e87040" stroke-width="2" fill="none" stroke-linejoin="round"/></svg>
      <span>Global Macro Monitor</span>
    </a>
    <button class="monitor-nav__hamburger" aria-label="Toggle menu" aria-expanded="false">
      <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <line x1="2" y1="4.5" x2="16" y2="4.5"/><line x1="2" y1="9" x2="16" y2="9"/><line x1="2" y1="13.5" x2="16" y2="13.5"/>
      </svg>
    </button>
    <ul class="monitor-nav__links" role="list">
      <li><a href="overview.html">Overview</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="report.html">Latest Issue</a></li>
      <li><a href="archive.html">Archive</a></li>
      <li><a href="persistent.html">Living Knowledge</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
    <div class="monitor-nav__actions">
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><circle cx="7.5" cy="7.5" r="3"/><line x1="7.5" y1="1" x2="7.5" y2="2.5"/><line x1="7.5" y1="12.5" x2="7.5" y2="14"/><line x1="1" y1="7.5" x2="2.5" y2="7.5"/><line x1="12.5" y1="7.5" x2="14" y2="7.5"/></svg>
        <svg class="icon-moon" viewBox="0 0 15 15" fill="currentColor" aria-hidden="true"><path d="M7.5 1a6.5 6.5 0 1 0 6.5 6.5A6.5 6.5 0 0 0 7.5 1zm0 12A5.5 5.5 0 1 1 11.7 3.8 6.5 6.5 0 0 0 7.5 13z"/></svg>
      </button>
    </div>

  <main id="main-content" style="max-width:var(--content-max);margin:0 auto;padding:0 var(--space-6)">
    <div class="search-wrap">

      <header style="margin-bottom:var(--space-8)">
        <div style="font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--monitor-accent);margin-bottom:var(--space-2)">GMM · Asymmetric Intelligence</div>
        <h1 style="font-size:var(--text-2xl);font-weight:700;letter-spacing:-0.025em;color:var(--color-text);margin-bottom:var(--space-3)">Search</h1>
        <p style="font-size:var(--text-base);color:var(--color-text-secondary)">Full-text search across all published issues.</p>
      </header>

      <input type="search" class="search-input-el" id="search-input"
        placeholder="Search across all issues…" autocomplete="off" spellcheck="false">

      <div class="search-status" id="search-status"></div>
      <div id="search-results"></div>

    </div>
  </main>

  <footer class="monitor-footer">
    <span>Global Macro Monitor · <a href="https://asym-intel.info">asym-intel.info</a></span>
    <span class="monitor-footer__credit"><a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener">Produced with Perplexity Computer</a></span>
  </footer>

  <script src="../shared/js/nav.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    var corpus = [];
    var loaded = false;

    function esc(s) {
      return String(s||'')        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function highlight(text, q) {
      var re = new RegExp('(' + q.replace(/[.*+?^${}()|[\\]\\\\]/g,'\\\\$&') + ')', 'gi');
      return esc(text).replace(re, '<mark>$1</mark>');
    }

    function flatten(obj, issue, items) {
      if (!obj || typeof obj !== 'object') return;
      if (Array.isArray(obj)) { obj.forEach(function(i){ flatten(i, issue, items); }); return; }
      var text = '';
      ['title','headline','summary','body','detail','note','signal','significance','description'].forEach(function(k){
        if (obj[k] && typeof obj[k] === 'string') text += ' ' + obj[k];
      });
      if (text.trim()) items.push({ text: text.trim(), issue: issue });
      Object.keys(obj).forEach(function(k){
        if (typeof obj[k] === 'object') flatten(obj[k], issue, items);
      });
    }

    function doSearch(q) {
      var statusEl  = document.getElementById('search-status');
      var resultsEl = document.getElementById('search-results');
      q = q.trim();
      if (!q) { resultsEl.innerHTML = ''; statusEl.textContent = ''; return; }
      if (!loaded) { statusEl.textContent = 'Loading corpus…'; return; }
      var lower = q.toLowerCase();
      var matches = corpus.filter(function(item){
        return item.text.toLowerCase().indexOf(lower) > -1;
      });
      // Deduplicate
      var seen = {}, deduped = [];
      matches.forEach(function(m){
        var k = m.issue + '|' + m.text.slice(0,80);
        if (!seen[k]) { seen[k] = true; deduped.push(m); }
      });
      statusEl.textContent = deduped.length
        ? deduped.length + ' result' + (deduped.length !== 1 ? 's' : '') + ' for "' + q + '"'
        : 'No results for "' + q + '"';
      if (!deduped.length) {
        resultsEl.innerHTML = '<p style="color:var(--color-text-muted);padding:var(--space-6) 0;font-size:var(--text-sm)">No results found. Try a different term.</p>';
        return;
      }
      resultsEl.innerHTML = deduped.slice(0,40).map(function(item){
        var preview = item.text.length > 200 ? item.text.slice(0,200) + '…' : item.text;
        return '<div class="search-result">' +
          '<div class="search-result__meta">Issue ' + esc(item.issue) + '</div>' +
          '<div class="search-result__body">' + highlight(preview, q) + '</div>' +
          '<a class="search-result__link" href="report.html">View issue →</a>' +
        '</div>';
      }).join('');
    }

    // Load corpus from archive.json then each report
    fetch('data/archive.json')
      .then(function(r){ return r.json(); })
      .then(function(issues){
        issues = Array.isArray(issues) ? issues : (issues.issues || []);
        statusEl_temp = document.getElementById('search-status');
        if (statusEl_temp) statusEl_temp.textContent = issues.length + ' issue' + (issues.length !== 1 ? 's' : '') + ' indexed.';
        var promises = issues.map(function(issue){
          var url = issue.url || ('data/report-' + (issue.slug || issue.published) + '.json');
          return fetch(url).then(function(r){ return r.json(); })
            .then(function(d){ flatten(d, issue.slug || issue.published || '?', corpus); })
            .catch(function(){});
        });
        return Promise.all(promises);
      })
      .then(function(){
        loaded = true;
        var statusEl = document.getElementById('search-status');
        if (statusEl) statusEl.textContent = corpus.length + ' searchable items loaded across all issues.';
      })
      .catch(function(){ 
        document.getElementById('search-status').textContent = 'Failed to load search index.';
      });

    var input = document.getElementById('search-input');
    var timer;
    input.addEventListener('input', function(){
      clearTimeout(timer);
      timer = setTimeout(function(){ doSearch(input.value); }, 200);
    });
    input.focus();
  });
  </script>
</body>
</html>
