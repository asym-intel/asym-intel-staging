<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive — Global Macro Monitor · Asymmetric Intelligence</title>
  <meta name="description" content="All published issues of the Global Macro Monitor. Weekly macro-financial intelligence from Asymmetric Intelligence.">
  <link rel="stylesheet" href="../shared/css/base.css">
  <link rel="stylesheet" href="assets/monitor.css">
  <script src="../shared/js/theme.js"></script>
  <script src="../shared/js/nav.js"></script>
</head>

<body>

<nav class="monitor-nav" aria-label="Monitor navigation">
  <a class="monitor-nav__brand" href="dashboard.html"></a>
  <button class="monitor-nav__hamburger" aria-label="Toggle menu" aria-expanded="false">
    <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
      <line x1="2" y1="4.5" x2="16" y2="4.5"/><line x1="2" y1="9" x2="16" y2="9"/><line x1="2" y1="13.5" x2="16" y2="13.5"/>
    </svg>
  </button>
  <ul class="monitor-nav__links" role="list"></ul>
  <div class="monitor-nav__actions"></div>
</nav>

<div class="monitor-layout">
  <main class="monitor-main" id="main-content">

    <div class="page-header">
      <div class="page-header__eyebrow">GMM · Asymmetric Intelligence</div>
      <h1 class="page-header__title">Archive</h1>
      <p class="page-header__sub">All published issues of the Global Macro Monitor. Each issue includes the system stress label, regime, delta strip, and full brief link.</p>
    </div>

    <section class="module-section" id="section-archive">
      <div id="archive-count" class="section-label" style="margin-bottom:var(--space-4)">Loading…</div>
      <div id="archive-list">
        <div class="loading-state">Loading archive…</div>
      </div>
    </section>

  </main>

  <nav class="monitor-sidebar" aria-label="Page sections">
    <div class="sidebar-nav__title">Archive</div>
    <ul id="sidebar-years">
      <li><a href="#section-archive">All Issues</a></li>
    </ul>
  </nav>
</div>

<footer class="monitor-footer"></footer>
<script src="../shared/js/renderer.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {

  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function fmtDate(str) {
    if (!str) return '';
    try { return new Date(str).toLocaleDateString('en-GB', {day:'numeric', month:'long', year:'numeric'}); }
    catch(e) { return str; }
  }

  function flagClass(flag) {
    if (!flag) return 'neutral';
    var f = String(flag).toUpperCase();
    if (f === 'WARNING') return 'warning';
    if (f === 'ELEVATED') return 'elevated';
    if (f === 'GREEN') return 'green';
    if (f.indexOf('BEARISH') !== -1) return 'bearish';
    if (f.indexOf('MILD') !== -1) return 'mild-neg';
    return 'neutral';
  }

  fetch('data/archive.json')
    .then(function (r) { return r.json(); })
    .then(function (issues) {
      var countEl = document.getElementById('archive-count');
      var listEl  = document.getElementById('archive-list');

      if (!issues || !issues.length) {
        countEl.textContent = '0 issues';
        listEl.innerHTML = '<p class="text-muted text-sm">No archived issues yet.</p>';
        return;
      }

      // Sort newest first
      var sorted = issues.slice().sort(function(a,b){
        return new Date(b.published||b.date||0) - new Date(a.published||a.date||0);
      });

      countEl.textContent = sorted.length + ' issue' + (sorted.length !== 1 ? 's' : '');

      var html = '';
      sorted.forEach(function (issue) {
        var pub = fmtDate(issue.published || issue.date || '');
        var stress = issue.system_stress_label || issue.signal || '';
        var regime = issue.regime || '';
        var delta  = issue.delta_strip || [];

        html += '<div class="card" style="margin-bottom:var(--space-6)">' +
          '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-4);flex-wrap:wrap;margin-bottom:var(--space-3)">' +
            '<div>' +
              '<div class="card__label">Issue ' + esc(issue.issue||'—') + ' · Vol ' + esc(issue.volume||'—') + ' · ' + esc(pub) + '</div>' +
              '<div class="card__title" style="margin-top:var(--space-1)">' + esc(issue.week_label || '') + '</div>' +
            '</div>' +
            '<div style="display:flex;gap:var(--space-2);flex-wrap:wrap">' +
              (stress ? '<span class="flag-badge flag-badge--elevated">' + esc(stress) + '</span>' : '') +
              (regime ? '<span class="regime-badge" style="font-size: var(--text-min)">' + esc(regime) + '</span>' : '') +
            '</div>' +
          '</div>' +
          (issue.signal ? '<p style="font-size:var(--text-sm);color:var(--color-text-secondary);line-height:1.6;margin-bottom:var(--space-3)">' + esc(issue.signal) + '</p>' : '') +
          (delta.length ? renderDeltaChips(delta) : '') +
          '<div style="margin-top:var(--space-4);display:flex;gap:var(--space-3)">' +
            (issue.source_url ? '<a class="btn btn--primary" href="' + esc(issue.source_url) + '" target="_blank" rel="noopener">Full Brief →</a>' : '') +
          '</div>' +
        '</div>';
      });

      listEl.innerHTML = html;
    })
    .catch(function () {
      document.getElementById('archive-list').innerHTML = '<div class="error-state">Failed to load archive data.</div>';
      document.getElementById('archive-count').textContent = 'Error';
    });

  function renderDeltaChips(delta) {
    var chips = delta.slice(0, 5).map(function (d) {
      return '<span class="badge badge--accent" style="margin-right:4px">' + esc(d.delta_type || d.module_tag || '') + '</span>' +
        '<span style="font-size:var(--text-xs);color:var(--color-text-muted);margin-right:var(--space-3)">' + esc(d.title || '') + '</span>';
    }).join('');
    return '<div style="font-size:var(--text-xs);color:var(--color-text-faint);line-height:1.8">' + chips + '</div>';
  }
});
</script>
</body>
</html>
