<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive — World Democracy Monitor · Asymmetric Intelligence</title>
  <meta name="description" content="Archive of all World Democracy Monitor issues. Weekly democratic integrity intelligence since March 2026.">
  <link rel="stylesheet" href="../shared/css/base.css">
  <link rel="stylesheet" href="assets/monitor.css">
  <script src="../shared/js/theme.js"></script>
  <script src="../shared/js/nav.js"></script>
</head>

<body>

<nav class="monitor-nav" aria-label="Monitor navigation">
  <a class="monitor-nav__brand" href="dashboard.html"></a>
  <button class="monitor-nav__hamburger" aria-label="Toggle menu" aria-expanded="false">
    <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
      <line x1="2" y1="4.5" x2="16" y2="4.5"/><line x1="2" y1="9" x2="16" y2="9"/><line x1="2" y1="13.5" x2="16" y2="13.5"/>
    </svg>
  </button>
  <ul class="monitor-nav__links" role="list"></ul>
  <div class="monitor-nav__actions"></div>
</nav>

<div class="monitor-layout">
  <main class="monitor-main" id="main-content">

    <section class="module-section" id="section-archive">
      <div class="page-header">
        <div class="page-header__eyebrow">WDM · Asymmetric Intelligence</div>
        <h1 class="page-header__title">Archive</h1>
        <p class="page-header__sub">All World Democracy Monitor issues, most recent first. Full briefs are published at <a href="https://asym-intel.info/monitors/democratic-integrity/">asym-intel.info/monitors/democratic-integrity/</a>.</p>
      </div>

      <div id="archive-list">
        <div class="loading-state">Loading archive…</div>
      </div>
    </section>

  </main>

  <nav class="monitor-sidebar" aria-label="Page sections">
    <div class="sidebar-nav__title">Sections</div>
    <ul>
      <li><a href="#section-archive">Archive</a></li>
    </ul>

  </nav>

</div>

<footer class="monitor-footer"></footer>
<script>
document.addEventListener('DOMContentLoaded', function () {
  function escHtml(str) {
    return String(str == null ? '' : str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  fetch('data/archive.json')
    .then(function (r) { return r.json(); })
    .then(function (issues) {
      var list = document.getElementById('archive-list');
      if (!issues || !issues.length) {
        list.innerHTML = '<p class="text-muted">No issues archived yet.</p>';
        return;
      }
      var html = '';
      issues.slice().reverse().forEach(function (issue) {
        var pub = issue.published
          ? new Date(issue.published).toLocaleDateString('en-GB', {day:'numeric',month:'long',year:'numeric'})
          : '';
        var deltaItems = (issue.delta_strip || []).slice(0, 3).map(function (d) {
          return '<span class="severity-badge severity-badge--high" style="margin-right:4px">' + escHtml(d.module || d.title || '') + '</span>';
        }).join('');
        html +=
          '<div class="archive-entry">' +
            '<div class="archive-entry__date">' + escHtml(pub) + '</div>' +
            '<div>' +
              '<div class="archive-entry__issue">Issue ' + escHtml(issue.issue || '—') + ' · ' + escHtml(issue.week_label || '') + '</div>' +
              '<div class="archive-entry__signal">' + escHtml(issue.signal || '') + '</div>' +
              (deltaItems ? '<div class="archive-entry__delta">' + deltaItems + '</div>' : '') +
              (issue.source_url
                ? '<a class="archive-entry__link" href="' + escHtml(issue.source_url) + '" target="_blank" rel="noopener">Full brief →</a>'
                : '') +
            '</div>' +
          '</div>';
      });
      list.innerHTML = html;
    })
    .catch(function () {
      document.getElementById('archive-list').innerHTML = '<div class="error-state">Failed to load archive data.</div>';
    });
});
</script>
</body>
</html>
