<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive — AI Governance Monitor · Asymmetric Intelligence</title>
  <meta name="description" content="Archive of all AI Governance Monitor weekly issues.">
  <link rel="stylesheet" href="../shared/css/base.css">
  <link rel="stylesheet" href="assets/monitor.css">
  <script src="../shared/js/theme.js"></script>
  <script src="../shared/js/nav.js"></script>
</head>

<body>

  <nav class="monitor-nav" aria-label="Monitor navigation">
  <a class="monitor-nav__brand" href="dashboard.html"></a>
  <button class="monitor-nav__hamburger" aria-label="Toggle menu" aria-expanded="false">
    <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
      <line x1="2" y1="4.5" x2="16" y2="4.5"/><line x1="2" y1="9" x2="16" y2="9"/><line x1="2" y1="13.5" x2="16" y2="13.5"/>
    </svg>
  </button>
  <ul class="monitor-nav__links" role="list"></ul>
  <div class="monitor-nav__actions"></div>
</nav>

  <div class="monitor-layout">
    <main class="monitor-main" id="main-content">

      <header class="page-header">
        <div class="page-header__eyebrow">AI Governance Monitor · Asymmetric Intelligence</div>
        <h1 class="page-header__title">Archive</h1>
        <p class="page-header__desc">All published issues of the AI Governance Monitor.</p>
      </header>

      <div id="archive-content">
        <p class="loading-state">Loading archive…</p>
      </div>

    </main>

    <!-- Right-hand sidebar -->
    <aside class="monitor-sidebar">
      <nav class="sidebar-nav" aria-label="Archive navigation">
        <div class="sidebar-nav__title">Quick Links</div>
        <ul>
          <li><a href="report.html">Latest Issue →</a></li>
          <li><a href="dashboard.html">Dashboard</a></li>
          <li><a href="search.html">Search Issues</a></li>
        </ul>
      </nav>
      <div class="sidebar-nav" style="margin-top:var(--space-6)">
        <div class="sidebar-nav__title">Issues</div>
        <div id="sidebar-issues"></div>
      </div>
    </aside>
  </div>

  <footer class="monitor-footer"></footer>
  <script src="../shared/js/renderer.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    fetch('data/archive.json')
      .then(function (r) { return r.json(); })
      .then(function (issues) {
        issues = Array.isArray(issues) ? issues : [];
        var sorted = issues.slice().sort(function (a, b) { return b.issue - a.issue; });

        var container = document.getElementById('archive-content');
        var sidebarIssues = document.getElementById('sidebar-issues');

        if (!sorted.length) {
          container.innerHTML = '<p class="empty-state">No issues yet.</p>';
          return;
        }

        container.innerHTML = '<div class="archive-grid">' + sorted.map(function (iss) {
          var deltaItems = Array.isArray(iss.delta_strip) ? iss.delta_strip : [];
          return '<article class="archive-card" id="issue-' + iss.issue + '">' +
            '<div class="archive-card__issue">Issue ' + esc(iss.issue) + '</div>' +
            '<div class="archive-card__week">' + esc(iss.week_label) + '</div>' +
            '<div class="archive-card__date">Published ' + esc(iss.published) + '</div>' +
            (iss.signal ? '<p class="archive-card__signal">' + esc(iss.signal.slice(0, 220)) + (iss.signal.length > 220 ? '…' : '') + '</p>' : '') +
            (deltaItems.length ? '<div class="archive-card__deltas"><div class="archive-card__deltas-label">Top signals this issue</div><ul>' +
              deltaItems.slice(0, 3).map(function (d) {
                return '<li class="archive-card__delta-item"><span class="tag">' + esc(d.module) + '</span> ' + esc(d.title) + '</li>';
              }).join('') +
              '</ul></div>' : '') +
            '<div class="archive-card__actions">' +
              '<a class="btn-accent" href="report.html">View Latest →</a>' +
              (iss.source_url ? '<a class="btn-secondary" href="' + esc(iss.source_url) + '" target="_blank" rel="noopener">Source →</a>' : '') +
            '</div>' +
            '</article>';
        }).join('') + '</div>';

        sidebarIssues.innerHTML = '<ul>' + sorted.map(function (iss) {
          return '<li><a href="#issue-' + iss.issue + '">Issue ' + esc(iss.issue) + ' · ' + esc(iss.published) + '</a></li>';
        }).join('') + '</ul>';
      })
      .catch(function () {
        document.getElementById('archive-content').innerHTML = '<p class="error-state">Could not load archive.</p>';
      });

    function esc(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
  });
  </script>
</body>
</html>
