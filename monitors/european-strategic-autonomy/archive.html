<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive — European Strategic Autonomy Monitor · Asymmetric Intelligence</title>
  <meta name="description" content="Archive of all published issues of the European Strategic Autonomy Monitor.">
  <link rel="stylesheet" href="../shared/css/base.css">
  <link rel="stylesheet" href="assets/monitor.css">
  <script src="../shared/js/theme.js"></script>
  <script src="../shared/js/nav.js"></script>
</head>

<body>
<nav class="monitor-nav" aria-label="Monitor navigation">
  <a class="monitor-nav__brand" href="dashboard.html"></a>
  <button class="monitor-nav__hamburger" aria-label="Toggle menu" aria-expanded="false">
    <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
      <line x1="2" y1="4.5" x2="16" y2="4.5"/><line x1="2" y1="9" x2="16" y2="9"/><line x1="2" y1="13.5" x2="16" y2="13.5"/>
    </svg>
  </button>
  <ul class="monitor-nav__links" role="list"></ul>
  <div class="monitor-nav__actions"></div>
</nav>

<div class="monitor-layout">
  <main class="monitor-main" id="main-content">

    <section class="module-section" id="section-archive">
      <div class="page-header">
        <div class="page-header__eyebrow">ESA &middot; Archive</div>
        <h1 class="page-header__title">Issue Archive</h1>
        <p class="page-header__sub">All published issues of the European Strategic Autonomy Monitor.</p>
      </div>

      <div id="archive-list">
        <div class="loading-state">Loading archive&hellip;</div>
      </div>
    </section>

  </main>

  <nav class="monitor-sidebar" aria-label="Page sections">
    <div class="sidebar-nav__title">Sections</div>
    <ul>
      <li><a href="#section-archive">Archive</a></li>
    </ul>

    <div style="padding:var(--space-6) var(--space-4) var(--space-4);border-top:1px solid var(--color-border-subtle);margin-top:var(--space-4)">
      <div style="font-size:var(--text-xs);color:var(--color-text-muted);line-height:1.5">Published every Wednesday at 19:00 UTC.</div>
      <div style="display:flex;flex-direction:column;gap:var(--space-2);margin-top:var(--space-4)">
        <a href="overview.html" class="btn btn--outline" style="justify-content:center;font-size:var(--text-xs)">Overview &rarr;</a>
        <a href="report.html" class="btn btn--primary" style="justify-content:center;font-size:var(--text-xs)">Latest Issue &rarr;</a>
      </div>
    </div>
  </nav>

</div>

<footer class="monitor-footer"></footer>
<script src="../shared/js/renderer.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  function escHtml(str) {
    return String(str == null ? '' : str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  fetch('data/archive.json')
    .then(function (r) { return r.json(); })
    .then(function (issues) {
      var list = document.getElementById('archive-list');
      if (!issues || !issues.length) {
        list.innerHTML = '<p class="text-muted">No archived issues yet.</p>';
        return;
      }
      var html = '';
      issues.slice().reverse().forEach(function (issue) {
        var pub = issue.published
          ? new Date(issue.published).toLocaleDateString('en-GB', {day:'numeric', month:'long', year:'numeric'})
          : '';
        var deltas = issue.delta_strip || [];
        html +=
          '<div class="archive-entry">' +
            '<div class="archive-entry__date">' + escHtml(pub) + '</div>' +
            '<div style="flex:1;min-width:0">' +
              '<div class="archive-entry__issue">Issue ' + escHtml(issue.issue || '—') + ' · ' + escHtml(issue.week_label || '') + '</div>' +
              '<div class="archive-entry__signal">' + escHtml(issue.signal || '') + '</div>';
        if (deltas.length) {
          html += '<ul style="margin-top:var(--space-2);padding-left:var(--space-4);font-size:var(--text-xs);color:var(--color-text-muted)">';
          deltas.slice(0, 3).forEach(function (d) {
            html += '<li>' + escHtml(d.title || '') + '</li>';
          });
          html += '</ul>';
        }
        html +=
            '</div>' +
            '<div style="margin-left:var(--space-4);flex-shrink:0">' +
              (issue.source_url
                ? '<a href="' + escHtml(issue.source_url) + '" class="btn btn--outline" style="font-size:var(--text-xs)">View &rarr;</a>'
                : '') +
            '</div>' +
          '</div>';
      });
      list.innerHTML = html;
    })
    .catch(function () {
      document.getElementById('archive-list').innerHTML = '<div class="error-state">Failed to load archive.</div>';
    });
});
</script>
</body>
</html>
