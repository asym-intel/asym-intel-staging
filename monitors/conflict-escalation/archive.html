<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive — Strategic Conflict & Escalation Monitor · Asymmetric Intelligence</title>
  <meta name="description" content="Archive of all past SCEM weekly intelligence issues. Searchable and organised by year.">
  <link rel="stylesheet" href="../shared/css/base.css">
  <link rel="stylesheet" href="assets/monitor.css">
  <script src="../shared/js/theme.js"></script>
  <script src="../shared/js/nav.js"></script>
</head>

<body>
<nav class="monitor-nav" aria-label="Monitor navigation">
  <a class="monitor-nav__brand" href="dashboard.html"></a>
  <button class="monitor-nav__hamburger" aria-label="Toggle menu" aria-expanded="false">
    <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
      <line x1="2" y1="4.5" x2="16" y2="4.5"/><line x1="2" y1="9" x2="16" y2="9"/><line x1="2" y1="13.5" x2="16" y2="13.5"/>
    </svg>
  </button>
  <ul class="monitor-nav__links" role="list"></ul>
  <div class="monitor-nav__actions"></div>
</nav>

<div class="monitor-layout">
  <main class="monitor-main" id="main-content">

    <section class="module-section" id="section-archive-header">
      <div class="page-header">
        <div class="page-header__eyebrow">SCEM · Asymmetric Intelligence</div>
        <h1 class="page-header__title">Issue Archive</h1>
        <p class="page-header__sub">Every weekly SCEM issue, most recent first. Each entry shows the week's lead signal and top delta items.</p>
      </div>
    </section>

    <section class="module-section" id="section-archive-2026">
      <div class="module-header">
        <div class="module-title">2026</div>
      </div>
      <div id="archive-2026">
        <div class="loading-state">Loading issues…</div>
      </div>
    </section>

  </main>

  <nav class="monitor-sidebar" aria-label="Page sections" id="page-sidebar">
    <div class="sidebar-nav__title">Sections</div>
    <ul id="sidebar-links">
      <li><a href="#section-archive-header">Archive</a></li>
      <li><a href="#section-archive-2026">2026</a></li>
    </ul>
  </nav>
</div>

<footer class="monitor-footer"></footer>
<script src="../shared/js/renderer.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  fetch('data/archive.json')
    .then(function (r) { return r.json(); })
    .then(renderArchive)
    .catch(function (e) {
      document.getElementById('archive-2026').innerHTML = '<div class="error-state">Failed to load archive: ' + e.message + '</div>';
    });

  function renderArchive(issues) {
    if (!issues || !issues.length) {
      document.getElementById('archive-2026').innerHTML = '<p class="text-muted">No archived issues yet.</p>';
      return;
    }

    // Group by year
    var byYear = {};
    issues.forEach(function (issue) {
      var year = (issue.published || '').split('-')[0] || '2026';
      if (!byYear[year]) byYear[year] = [];
      byYear[year].push(issue);
    });

    // Update sidebar and sections
    var sidebarHtml = '<li><a href="#section-archive-header">Archive</a></li>';
    var mainHtml = '';

    Object.keys(byYear).sort().reverse().forEach(function (year) {
      var yearIssues = byYear[year].slice().reverse();
      sidebarHtml += '<li><a href="#section-archive-' + year + '">' + year + '</a></li>';
      yearIssues.forEach(function (issue) {
        sidebarHtml += '<li style="padding-left:var(--space-2)"><a href="#section-archive-' + year + '" style="font-size:var(--text-sm)">Issue ' + (issue.issue||'—') + '</a></li>';
      });

      var issuesHtml = yearIssues.map(function (issue) {
        var pub = issue.published ? new Date(issue.published).toLocaleDateString('en-GB', {day:'numeric', month:'long', year:'numeric'}) : '';
        var deltaHtml = (issue.delta_strip||[]).slice(0,5).map(function (d) {
          return '<div style="font-size:var(--text-sm);color:var(--color-text-secondary);padding:var(--space-1) 0;border-bottom:1px solid var(--color-border-subtle)">' +
            '<strong style="color:var(--monitor-accent)">#' + d.rank + ' ' + escHtml(d.module_tag||'') + '</strong> — ' + escHtml(d.title||'') +
            '<br><span style="color:var(--color-text-muted)">' + escHtml(d.one_line||'') + '</span>' +
          '</div>';
        }).join('');

        return '<div class="archive-entry">' +
          '<div class="archive-entry__date">' + pub + '</div>' +
          '<div>' +
            '<div class="archive-entry__issue">Issue ' + (issue.issue||'—') + ' · ' + escHtml(issue.week_label||'') + '</div>' +
            '<div class="archive-entry__signal">' + escHtml(issue.signal||'') + '</div>' +
            (deltaHtml ? '<div class="archive-entry__delta">' + deltaHtml + '</div>' : '') +
            (issue.source_url ? '<a class="archive-entry__link" href="' + escHtml(issue.source_url) + '" target="_blank" rel="noopener">Full brief →</a>' : '') +
          '</div>' +
        '</div>';
      }).join('');

      // Create section for the year if it doesn't exist as section-archive-{year}
      if (year === '2026') {
        document.getElementById('archive-2026').innerHTML = issuesHtml;
      } else {
        mainHtml += '<section class="module-section" id="section-archive-' + year + '">' +
          '<div class="module-header"><div class="module-title">' + year + '</div></div>' +
          '<div>' + issuesHtml + '</div>' +
          '</section>';
      }
    });

    document.getElementById('sidebar-links').innerHTML = sidebarHtml;
    if (mainHtml) {
      var main = document.getElementById('main-content');
      main.insertAdjacentHTML('beforeend', mainHtml);
    }
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
});
</script>
</body>
</html>
