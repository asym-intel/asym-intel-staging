name: Mirror to GitLab

on:
  workflow_dispatch:
  push:
    branches: ["**"]
    tags: ["**"]
  delete:

jobs:
  mirror:
    name: Push mirror to GitLab
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if GITLAB_PAT not set
        id: g
        env: { P: "${{ secrets.GITLAB_PAT }}" }
        run: if [ -z "$P" ]; then echo run=false >> $GITHUB_OUTPUT; else echo run=true >> $GITHUB_OUTPUT; fi

      - name: Push to GitLab
        if: steps.g.outputs.run == 'true'
        env:
          GITLAB_PAT: ${{ secrets.GITLAB_PAT }}
        run: |
          git remote add gitlab "https://oauth2:${GITLAB_PAT}@gitlab.com/asym-intel/asym-intel-staging.git"
          git push gitlab --all --force
          git push gitlab --tags --force